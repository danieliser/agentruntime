<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agentruntime Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="brand">
                    <svg class="logo" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="26" height="26" rx="6" stroke="#00d4ff" stroke-width="2"/>
                        <path d="M8 10h4v8H8z" fill="#00d4ff" opacity="0.8"/>
                        <path d="M14 8h4v10h-4z" fill="#00d4ff" opacity="0.6"/>
                        <path d="M20 12h2v6h-2z" fill="#00d4ff" opacity="0.4"/>
                    </svg>
                    <h1>agent<span class="brand-accent">runtime</span></h1>
                </div>
                <div class="header-right">
                    <div class="health-status">
                        <span class="status-badge" id="status-badge">Loading...</span>
                        <span class="runtime-list" id="runtime-list"></span>
                    </div>
                    <nav class="header-links">
                        <a href="https://github.com/danieliser/agentruntime" target="_blank" rel="noopener" class="header-link" title="GitHub">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                        </a>
                        <a href="https://github.com/danieliser/agentruntime/issues" target="_blank" rel="noopener" class="header-link" title="Issues">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zm-.25-6.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z"/></svg>
                        </a>
                        <a href="https://github.com/danieliser/agentruntime#readme" target="_blank" rel="noopener" class="header-link" title="Docs">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75A.75.75 0 01.75 1h4.253c1.227 0 2.317.59 3 1.501A3.744 3.744 0 0111.006 1h4.245a.75.75 0 01.75.75v10.5a.75.75 0 01-.75.75h-4.507a2.25 2.25 0 00-1.591.659l-.622.621a.75.75 0 01-1.06 0l-.622-.621A2.25 2.25 0 005.258 13H.75a.75.75 0 01-.75-.75V1.75zm7.251 10.324l.004-5.073-.002-2.253A2.25 2.25 0 005.003 2.5H1.5v9h3.757a3.75 3.75 0 011.994.574zM8.755 4.75l-.004 7.322a3.752 3.752 0 011.992-.572H14.5v-9h-3.495a2.25 2.25 0 00-2.25 2.25z"/></svg>
                        </a>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Tab Navigation -->
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="active">Active</button>
                <button class="tab-btn" data-tab="history">History</button>
            </div>

            <!-- Active Sessions Tab -->
            <div class="tab-content active" id="tab-active">
                <div class="sessions-section">
                    <h2>Active Sessions</h2>
                    <table class="sessions-table" id="sessions-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Agent</th>
                                <th>Runtime</th>
                                <th>Status</th>
                                <th>Uptime</th>
                                <th>Tokens</th>
                                <th>Tools</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sessions-body">
                            <tr><td colspan="8" class="empty-message">No sessions</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-content" id="tab-history">
                <div class="sessions-section">
                    <h2>Session History</h2>
                    <table class="sessions-table" id="history-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Agent</th>
                                <th>Status</th>
                                <th>Duration</th>
                                <th>Tokens</th>
                                <th>Tools</th>
                                <th>Cost</th>
                                <th>Size</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <tr><td colspan="10" class="empty-message">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Detail Panel -->
            <div class="detail-panel" id="detail-panel" style="display: none;">
                <div class="detail-header">
                    <h3>Session Details</h3>
                    <button class="close-btn" id="close-detail">×</button>
                </div>
                <div class="detail-content" id="detail-content">
                    <!-- Populated by JS -->
                </div>
                <div class="event-log" id="event-log">
                    <!-- Live events here -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <span>agentruntime</span>
            <span class="footer-sep">&middot;</span>
            <a href="https://github.com/danieliser/agentruntime" target="_blank" rel="noopener">GitHub</a>
            <span class="footer-sep">&middot;</span>
            <a href="https://github.com/danieliser/agentruntime/issues/new" target="_blank" rel="noopener">Report Issue</a>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
