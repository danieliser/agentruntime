name: Release PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: ubuntu-latest
            wheel_plat: macosx_11_0_arm64
          - goos: darwin
            goarch: amd64
            runner: ubuntu-latest
            wheel_plat: macosx_11_0_x86_64
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            wheel_plat: manylinux_2_17_x86_64
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            wheel_plat: manylinux_2_17_aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build agentd binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o packages/agentd-py/agentruntime_agentd/bin/agentd ./cmd/agentd

      - name: Patch version in pyproject.toml
        working-directory: packages/agentd-py
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Install build tools
        run: pip install build wheel

      - name: Build platform wheel
        working-directory: packages/agentd-py
        env:
          WHEEL_PLAT: ${{ matrix.wheel_plat }}
        run: |
          python -m build --wheel
          # Rename wheel to use platform-specific tag
          cd dist
          for f in *.whl; do
            newname=$(echo "$f" | sed "s/py3-none-any/py3-none-${WHEEL_PLAT}/")
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
            fi
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/agentd-py/dist/*.whl

  # Also build musl variants for Linux
  build-wheels-musl:
    name: Build wheel (linux-${{ matrix.goarch }}-musl)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            wheel_plat: musllinux_1_1_x86_64
          - goarch: arm64
            wheel_plat: musllinux_1_1_aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build agentd binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o packages/agentd-py/agentruntime_agentd/bin/agentd ./cmd/agentd

      - name: Patch version in pyproject.toml
        working-directory: packages/agentd-py
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Install build tools
        run: pip install build wheel

      - name: Build platform wheel
        working-directory: packages/agentd-py
        env:
          WHEEL_PLAT: ${{ matrix.wheel_plat }}
        run: |
          python -m build --wheel
          cd dist
          for f in *.whl; do
            newname=$(echo "$f" | sed "s/py3-none-any/py3-none-${WHEEL_PLAT}/")
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
            fi
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.goarch }}-musl
          path: packages/agentd-py/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-wheels-musl]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
